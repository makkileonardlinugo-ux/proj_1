<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You · Tester.io</title>
  <link rel="icon" type="image/png" href="brand_assets/tester-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0c10;
      --text:    #f2f4f5;
      --muted:   #8b9197;
      --accent:  #c6a559;
      --accent-2: #e6b979;
      --accent-glow: rgba(198,165,89,0.35);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(60% 50% at 50% 20%, rgba(198,165,89,0.12), transparent 70%);
    }
    .icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(198,165,89,0.10);
      border: 1px solid rgba(198,165,89,0.30);
      display: grid; place-items: center;
      color: var(--accent);
      margin-bottom: 8px;
      animation: pop 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      background: linear-gradient(120deg, var(--accent), var(--accent-2) 60%, var(--accent));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: fadein 0.7s 0.2s both;
    }
    p { color: var(--muted); font-size: 1.05rem; animation: fadein 0.7s 0.35s both; }
    .bar-wrap {
      width: 200px; height: 3px; background: rgba(255,255,255,0.06);
      border-radius: 99px; overflow: hidden; animation: fadein 0.7s 0.5s both;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 99px;
      animation: drain 5s linear forwards;
    }
    @keyframes drain { from { width: 100%; } to { width: 0%; } }
    @keyframes fadein { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>Message sent.</h1>
  <p>We'll be in touch soon. Redirecting in <span id="count">5</span>s&hellip;</p>
  <div class="bar-wrap"><div class="bar-fill"></div></div>

  <script>
    var n = 5;
    var el = document.getElementById("count");
    var t = setInterval(function () {
      el.textContent = --n;
      if (n <= 0) clearInterval(t);
    }, 1000);
    setTimeout(function () { window.location.href = "product.html"; }, 5000);
  </script>
</body>
</html>
